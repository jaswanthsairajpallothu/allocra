name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This step bridges your desired architecture with Vite's requirements
      - name: Sync Global Assets to Frontend
        run: |
          mkdir -p allocra-frontend/public
          cp -r assets allocra-frontend/public/
        
      - name: Install and Build
        run: npm install && npm run build
        working-directory: allocra-frontend

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALLOCATION_SYSTEM_494617 }}
          channelId: live
          projectId: allocation-system-494617
          entryPoint: allocra-frontend